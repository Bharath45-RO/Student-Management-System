<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Student Management Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" th:href="@{/css/style.css}">

<style>
body{
    background:#f5f7fb;
}

.login-box{
    width:420px;
    margin:80px auto;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.login-box h2{
    text-align:center;
    margin-bottom:25px;
    color:#2f6f5f;
}

.btn-success{
    background:#2f6f5f;
    border:none;
}

.btn-success:hover{
    background:#25594d;
}
</style>

</head>
<body>

<div class="login-box">

<h2>Student Management System</h2>

<form action="/login" method="post">

<div class="mb-3">

<label>Username</label>

<input type="text"
name="username"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Password</label>

<input type="password"
name="password"
class="form-control"
required>

</div>

<div class="d-grid">

<button class="btn btn-success">

Login

</button>

</div>

<br>

<p class="text-danger text-center" th:text="${error}"></p>

</form>

</div>
<div class="text-center mt-3">
    <a th:href="@{/forgot-password}">
        Forgot Password?
    </a>
</div>

</body>
</html>
